<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GitHub Issue 管理器</title>
        <link
            type="image/png"
            rel="icon"
            href="https://img.icons8.com/material-outlined/24/read.png"
        />
        <!-- 关键CSS同步加载 -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css"
        />
        <!-- 非关键CSS异步加载 -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/viewerjs/dist/viewer.min.css"
            media="print"
            onload="this.media = 'all'"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/monokai-sublime.min.css"
            media="print"
            onload="this.media = 'all'"
        />
        <!-- 本地 CSS（variables 必须最先加载） -->
        <link rel="stylesheet" href="css/variables.css" />
        <link rel="stylesheet" href="css/base.css" />
        <link rel="stylesheet" href="css/header.css" />
        <link rel="stylesheet" href="css/sidebar.css" />
        <link rel="stylesheet" href="css/content.css" />
        <link rel="stylesheet" href="css/markdown.css" />
        <link rel="stylesheet" href="css/create-mode.css" />
        <link rel="stylesheet" href="css/modal.css" />
        <link rel="stylesheet" href="css/responsive.css" />
        <!-- 外部 JS 资源（同步加载，确保在本地脚本之前可用） -->
        <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/viewerjs/dist/viewer.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    </head>

    <body>
        <!-- ==================== Header ==================== -->
        <div class="header">
            <button class="sidebar-toggle header-btn active" id="sidebarToggle">
                <svg
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <path
                        fill-rule="evenodd"
                        clip-rule="evenodd"
                        d="M3 3H21C21.5523 3 22 3.44772 22 4V20C22 20.5523 21.5523 21 21 21H3C2.44772 21 2 20.5523 2 20V4C2 3.44772 2.44772 3 3 3ZM8 5H4V19H8V5ZM10 5V19H20V5H10Z"
                        fill="currentColor"
                    />
                </svg>
            </button>
            <a class="header-title" id="headerTitle" target="_blank"
                >GitHub Issue 管理器</a
            >
            <div class="header-actions" id="headerActions">
                <div class="dropdown" id="importDropdown">
                    <button class="toolbar-btn" id="importBtn" title="导入">
                        <svg
                            width="14"
                            height="14"
                            viewBox="0 0 16 16"
                            fill="currentColor"
                        >
                            <path
                                d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Zm-0-0ZM7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.969a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.78a.749.749 0 1 1 1.06-1.06l1.97 1.969Z"
                            ></path>
                        </svg>
                    </button>
                    <div class="dropdown-content">
                        <button id="importLocalBtn">从本地文件</button>
                        <button id="importUrlBtn">从 URL</button>
                    </div>
                </div>
                <button class="toolbar-btn danger" id="clearBtn" title="清空">
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 16 16"
                        fill="currentColor"
                    >
                        <path
                            d="M6.116 1.5H9.884a.25.25 0 0 1 .234.166l.544 1.459H5.338l.544-1.459A.25.25 0 0 1 6.116 1.5Zm-1.274.347L4.18 3.625H2.5A.75.75 0 0 0 2.5 5.125h11a.75.75 0 0 0 0-1.5h-1.68l-.662-1.778A1.75 1.75 0 0 0 9.884.5H6.116a1.75 1.75 0 0 0-1.643 1.147Zm9.335 3.778H3.823l.695 8.764a.75.75 0 0 0 .747.686h5.47a.75.75 0 0 0 .747-.686l.695-8.764Z"
                        ></path>
                    </svg>
                </button>
                <button class="toolbar-btn" id="saveBtn" title="保存">
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 16 16"
                        fill="currentColor"
                    >
                        <path
                            d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 9 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"
                        ></path>
                    </svg>
                </button>
            </div>
            <div class="menu-dropdown" id="menuDropdown">
                <button class="menu-toggle" id="menuBtn" title="切换模式">
                    <svg
                        width="20"
                        height="20"
                        viewBox="0 0 16 16"
                        fill="currentColor"
                    >
                        <path
                            d="M5.22 1.72a.75.75 0 0 1 0 1.06L2.56 5.44l2.66 2.66a.75.75 0 0 1-1.06 1.06L.97 5.97a.75.75 0 0 1 0-1.06l3.19-3.19a.75.75 0 0 1 1.06 0Zm5.56 0a.75.75 0 0 1 1.06 0l3.19 3.19a.75.75 0 0 1 0 1.06l-3.19 3.19a.75.75 0 1 1-1.06-1.06l2.66-2.66-2.66-2.66a.75.75 0 0 1 0-1.06Z"
                        ></path>
                    </svg>
                </button>
                <div class="menu-panel">
                    <button class="menu-item active" id="menuView">查看</button>
                    <button class="menu-item" id="menuCreate">新建</button>
                    <button class="menu-item" id="menuSwitchRepo">换仓</button>
                </div>
            </div>
        </div>

        <!-- ==================== View Mode ==================== -->
        <div class="view-mode" id="viewMode">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-search">
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="搜索 issue..."
                    />
                </div>
                <ul class="sidebar-list" id="issueList"></ul>
            </div>
            <div class="content" id="content">
                <button class="edit-btn" id="editBtn" title="编辑此 Issue">
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 16 16"
                        fill="currentColor"
                    >
                        <path
                            d="M11.013 1.427a1.75 1.75 0 0 1 2.474 0l1.086 1.086a1.75 1.75 0 0 1 0 2.474l-8.61 8.61c-.21.21-.47.364-.756.445l-3.251.93a.75.75 0 0 1-.927-.928l.929-3.25a1.75 1.75 0 0 1 .445-.758l8.61-8.61Zm1.414 1.06a.25.25 0 0 0-.354 0L3.463 11.1a.25.25 0 0 0-.064.108l-.563 1.97 1.971-.564a.25.25 0 0 0 .108-.064l8.61-8.61a.25.25 0 0 0 0-.353l-1.098-1.098Z"
                        ></path>
                    </svg>
                </button>
                <div class="content-edit-toolbar" id="contentEditToolbar">
                    <input
                        type="text"
                        class="edit-title-input"
                        id="editTitleInput"
                        placeholder="Issue 标题"
                    />
                    <button
                        class="toolbar-btn"
                        id="editPreviewToggle"
                        title="预览"
                    >
                        <svg
                            width="14"
                            height="14"
                            viewBox="0 0 16 16"
                            fill="currentColor"
                        >
                            <path
                                d="M8 2C4.5 2 1.5 5.5 1.5 8s3 6 6.5 6 6.5-3.5 6.5-6-3-6-6.5-6Zm0 10.5c-2.5 0-5-2.5-5-4.5S5.5 3 8 3s5 2.5 5 4.5-2.5 5-5 5Zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6Zm0 5a2 2 0 1 1 0-4 2 2 0 0 1 0 4Z"
                            ></path>
                        </svg>
                    </button>
                    <button
                        class="toolbar-btn primary"
                        id="editSaveBtn"
                        title="保存"
                    >
                        保存
                    </button>
                    <button
                        class="toolbar-btn danger"
                        id="editCancelBtn"
                        title="取消"
                    >
                        取消
                    </button>
                </div>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <span>加载中...</span>
                </div>
                <div
                    class="markdown-body"
                    id="markdownContent"
                    style="display: none"
                ></div>
                <div class="content-edit-body" id="contentEditBody">
                    <textarea
                        class="shared-textarea"
                        id="editContentInput"
                        placeholder="用 Markdown 编辑 Issue 内容..."
                    ></textarea>
                </div>
                <div
                    class="content-edit-preview preview-area"
                    id="contentEditPreview"
                >
                    <div class="markdown-body" id="editPreviewContent"></div>
                </div>
            </div>
        </div>

        <!-- ==================== Create Mode ==================== -->
        <div class="create-mode hidden" id="createMode">
            <div class="create-toolbar">
                <input
                    type="text"
                    class="title-input-inline"
                    id="titleInput"
                    placeholder="Issue 标题"
                />
                <div class="create-toolbar-group">
                    <button
                        class="toolbar-btn primary"
                        id="publishBtn"
                        disabled
                        title="发布"
                    >
                        <svg
                            width="16"
                            height="16"
                            viewBox="0 0 16 16"
                            fill="currentColor"
                        >
                            <path
                                d="M0 1.75A.75.75 0 0 1 .79 1l7.5 2.5a.75.75 0 0 1 0 1.42L5 6.32v4.93a.75.75 0 0 1-1.28.53L2.22 10.28l-1.69 3.55a.75.75 0 1 1-1.36-.63l1.82-3.83a.75.75 0 0 1 .55-.41.74.74 0 0 1 .65.2L3.5 10.5V6.32L.79 5.17A.75.75 0 0 1 0 1.75Zm6.28.47L14.5.56l-3.44 7.69L6.28 5.5V2.22Z"
                            ></path>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="create-main">
                <div class="editor-pane">
                    <div class="editor-pane-inner">
                        <button
                            class="preview-toggle"
                            id="previewToggle"
                            title="预览"
                        >
                            <svg
                                width="18"
                                height="18"
                                viewBox="0 0 16 16"
                                fill="currentColor"
                            >
                                <path
                                    d="M8 2C4.5 2 1.5 5.5 1.5 8s3 6 6.5 6 6.5-3.5 6.5-6-3-6-6.5-6Zm0 10.5c-2.5 0-5-2.5-5-4.5S5.5 3 8 3s5 2.5 5 4.5-2.5 5-5 5Zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6Zm0 5a2 2 0 1 1 0-4 2 2 0 0 1 0 4Z"
                                ></path>
                            </svg>
                        </button>
                        <div class="editor-write active" id="editorWrite">
                            <textarea
                                class="shared-textarea"
                                id="contentInput"
                                placeholder="用 Markdown 编写 Issue 内容..."
                            ></textarea>
                        </div>
                        <div
                            class="editor-preview-pane preview-area"
                            id="editorPreviewPane"
                        >
                            <div
                                class="preview-content markdown-body"
                                id="editorPreview"
                            ></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ==================== Token Modal ==================== -->
        <div class="modal-overlay hidden" id="tokenModal">
            <div class="modal">
                <h3 class="modal-title">GitHub 认证</h3>
                <div class="modal-body">
                    <label for="githubToken">GitHub 个人访问令牌</label>
                    <input
                        type="password"
                        id="githubToken"
                        placeholder="输入你的 GitHub token"
                    />
                    <p class="error-message" id="tokenError"></p>
                    <label for="repoSelect">选择仓库</label>
                    <select id="repoSelect" disabled>
                        <option value="">先验证 token</option>
                    </select>
                    <p class="error-message" id="repoError"></p>
                </div>
                <div class="modal-footer">
                    <button class="modal-button" id="cancelTokenBtn">
                        取消
                    </button>
                    <button class="modal-button primary" id="verifyTokenBtn">
                        验证
                    </button>
                    <button
                        class="modal-button primary"
                        id="saveTokenBtn"
                        style="display: none"
                    >
                        保存
                    </button>
                </div>
            </div>
        </div>

        <!-- ==================== Repo Switch Modal ==================== -->
        <div class="modal-overlay hidden" id="repoSwitchModal">
            <div class="modal">
                <h3 class="modal-title">切换仓库</h3>
                <div class="modal-body">
                    <label for="newRepoSelect">选择新仓库</label>
                    <select id="newRepoSelect">
                        <option value="">加载中...</option>
                    </select>
                    <p class="error-message" id="newRepoError"></p>
                </div>
                <div class="modal-footer">
                    <button class="modal-button" id="cancelSwitchBtn">
                        取消
                    </button>
                    <button class="modal-button primary" id="saveSwitchBtn">
                        切换
                    </button>
                </div>
            </div>
        </div>

        <!-- ==================== Import URL Modal ==================== -->
        <div class="modal-overlay hidden" id="urlModal">
            <div class="modal">
                <h3 class="modal-title">从 URL 导入</h3>
                <div class="modal-body">
                    <label for="urlInput">Markdown 文件 URL</label>
                    <input
                        type="text"
                        id="urlInput"
                        placeholder="https://..."
                    />
                </div>
                <div class="modal-footer">
                    <button class="modal-button" id="cancelUrlBtn">取消</button>
                    <button class="modal-button primary" id="loadUrlBtn">
                        加载
                    </button>
                </div>
            </div>
        </div>

        <!-- ==================== Publish Repo Selection Modal ==================== -->
        <div class="modal-overlay hidden" id="publishRepoModal">
            <div class="modal">
                <h3 class="modal-title">选择发布仓库</h3>
                <div class="modal-body">
                    <label>选择要发布 Issue 的仓库</label>
                    <div class="repo-list" id="publishRepoList">
                        <div class="repo-list-item">加载中...</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="modal-button" id="cancelPublishRepoBtn">
                        取消
                    </button>
                    <button
                        class="modal-button primary"
                        id="confirmPublishRepoBtn"
                        disabled
                    >
                        发布
                    </button>
                </div>
            </div>
        </div>

        <!-- ==================== Toast ==================== -->
        <div class="toast" id="toast"></div>

        <!-- 本地 JS（按依赖顺序 defer 加载） -->
        <script defer src="js/state.js"></script>
        <script defer src="js/dom-refs.js"></script>
        <script defer src="js/utils.js"></script>
        <script defer src="js/auth.js"></script>
        <script defer src="js/view-mode.js"></script>
        <script defer src="js/edit-mode.js"></script>
        <script defer src="js/create-mode.js"></script>
        <script defer src="js/mode-switch.js"></script>
        <script defer src="js/main.js"></script>
    </body>
</html>
