<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Viewer</title>
    <link type="image/png" rel="icon" href="https://img.icons8.com/material-outlined/24/read.png">
    <!-- [优化1] 关键CSS同步加载，非关键CSS异步加载 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/viewerjs/dist/viewer.min.css" media="print"
        onload="this.media='all'">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/monokai-sublime.min.css" media="print"
        onload="this.media='all'">
    <!-- [优化1] JS 资源添加 defer，避免阻塞 HTML 解析 -->
    <!-- [优化1-XSS] 引入 DOMPurify 防止 XSS 攻击 -->
    <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/viewerjs/dist/viewer.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --header-height: 50px;
            --sidebar-width: 300px;
            --primary-text: #24292f;
            --primary-bg: #ffffff;
            --border-color: #d0d7de;
            --secondary-text: #57606a;
            --sidebar-bg: #f6f8fa;
            --hover-bg: #0000001a;
            --accent-color: #0969da;
            --accent-hover: #0a5dc2;
            --accent-bg: rgba(9, 105, 218, 0.1);
            --danger-color: #cf222e;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary-text: #e6edf3;
                --primary-bg: #0d1117;
                --border-color: #30363d;
                --secondary-text: #7d8590;
                --sidebar-bg: #161b22;
                --hover-bg: #ffffff1a;
                --accent-color: #2f81f7;
                --accent-hover: #1a6fef;
                --accent-bg: rgba(47, 129, 247, 0.1);
                --danger-color: #ff7b72;
            }
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            color: var(--primary-text);
            background-color: var(--primary-bg);
            transition: color 0.3s, background-color 0.3s;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            height: var(--header-height);
            border-bottom: 1px solid var(--border-color);
            padding: 0 10px;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            background-color: var(--primary-bg);
            z-index: 100;
            box-sizing: border-box;
        }

        .header-btn {
            background: none;
            border: none;
            color: var(--primary-text);
            cursor: pointer;
            font-size: 16px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        .sidebar-toggle.active {
            background-color: var(--hover-bg);
        }

        .header-title {
            white-space: nowrap;
            overflow: auto;
            font-weight: 600;
            color: var(--primary-text);
            text-decoration: none;
        }

        .container {
            display: flex;
            height: calc(100vh - var(--header-height));
            margin-top: var(--header-height);
        }

        .sidebar {
            width: var(--sidebar-width);
            border-right: 1px solid var(--border-color);
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        .sidebar-search {
            padding: 15px;
            position: sticky;
            top: 0;
            background-color: var(--sidebar-bg);
            z-index: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-search input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--primary-bg);
            color: var(--primary-text);
            font-size: 14px;
            box-sizing: border-box;
        }

        .sidebar-search input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent-color) 30%, transparent);
        }

        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .sidebar-item {
            padding: 8px 15px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background-color 0.1s;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-item.active {
            border-left: 3px solid var(--accent-color);
            background-color: var(--accent-bg);
        }

        .sidebar-item.active .sidebar-item-title {
            white-space: normal;
        }

        .sidebar-item-title {
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-item-meta {
            font-size: 12px;
            color: var(--secondary-text);
            display: flex;
            justify-content: space-between;
        }

        .sidebar-item-meta span:first-of-type {
            color: #26a2a6;
        }

        .sidebar-item-meta span:last-of-type {
            align-self: flex-end;
        }

        .content {
            flex: 1;
            overflow-y: auto;
        }

        .markdown-body {
            color: #f0f6fcbf;
            max-width: 880px;
            margin: 0 auto;
            box-sizing: border-box;
            padding: 25px 40px;
        }

        @media (max-width: 767px) {
            .markdown-body {
                padding: 15px;
            }
        }

        .markdown-body pre {
            background-color: black;
            border: 1px solid #3373bc;
            display: grid;
            grid-template-columns: 1fr auto;
            overflow: hidden;
            padding: 0;
        }

        .copybtn {
            height: fit-content;
            margin: .5rem .5rem 0 0;
            cursor: pointer;
        }

        .markdown-body pre>code {
            overflow: auto;
            padding: 1rem;
        }

        .markdown-body code {
            background-color: #6e768166;
        }

        .markdown-body img {
            cursor: zoom-in;
        }

        .markdown-body a,
        .markdown-body a:hover {
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-position: under;
        }

        .markdown-body strong {
            color: #b8b846b9;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
        }

        .markdown-body em {
            color: #9191ff;
            letter-spacing: 0.5px;
        }

        .markdown-body blockquote {
            background-color: #2f3e4fac;
            padding: 20px;
            border-radius: 10px;
            border-left: .25em solid #ff00d4c5;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background-color: var(--primary-bg);
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            width: 90%;
            max-width: 500px;
            padding: 20px;
        }

        .modal-title {
            margin: 0 0 20px;
            font-size: 20px;
            font-weight: 600;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-body label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .modal-body input,
        .modal-body select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--primary-bg);
            color: var(--primary-text);
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .modal-body input:focus,
        .modal-body select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent-color) 30%, transparent);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modal-button {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            font-size: 14px;
            border: 1px solid var(--border-color);
            background-color: var(--primary-bg);
            color: var(--primary-text);
        }

        .modal-button.primary {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .error-message {
            color: var(--danger-color);
            font-size: 14px;
            margin-top: 5px;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: var(--secondary-text);
        }

        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 3px solid var(--accent-color);
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @media (hover: hover) {

            .sidebar-toggle:hover {
                background-color: var(--hover-bg);
            }

            .sidebar-item:hover {
                background-color: var(--hover-bg);
            }

            .repo-switcher:hover {
                background-color: var(--hover-bg);
            }

            .modal-button.primary:hover {
                background-color: var(--accent-hover);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: var(--header-height);
                left: 0;
                bottom: 0;
                transform: translateX(-100%);
                width: 80%;
                max-width: 300px;
            }

            .sidebar.visible {
                transform: translateX(0);
            }

            .content {
                padding: 0 10px;
            }
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        @media (min-width: 769px) {
            .sidebar.collapsed {
                width: 0;
                overflow: hidden;
                border-right: none;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <button class="sidebar-toggle header-btn" id="sidebarToggle">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd"
                    d="M3 3H21C21.5523 3 22 3.44772 22 4V20C22 20.5523 21.5523 21 21 21H3C2.44772 21 2 20.5523 2 20V4C2 3.44772 2.44772 3 3 3ZM8 5H4V19H8V5ZM10 5V19H20V5H10Z"
                    fill="currentColor" />
            </svg>
        </button>
        <a class="header-title" id="headerTitle" target="_blank">GitHub Issue 查看器</a>
        <button class="repo-switcher header-btn" id="repoSwitcher">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd"
                    d="M16.0503 12.0498L21 16.9996L16.0503 21.9493L14.636 20.5351L17.172 17.9988L4 17.9996V15.9996L17.172 15.9988L14.636 13.464L16.0503 12.0498ZM7.94975 2.0498L9.36396 3.46402L6.828 5.9988L20 5.99955V7.99955L6.828 7.9988L9.36396 10.5351L7.94975 11.9493L3 6.99955L7.94975 2.0498Z"
                    fill="currentColor" />
            </svg>
        </button>
    </div>

    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-search">
                <input type="text" id="searchInput" placeholder="搜索 issue...">
            </div>
            <ul class="sidebar-list" id="issueList"></ul>
        </div>
        <div class="content" id="content">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span>加载中...</span>
            </div>
            <div class="markdown-body" id="markdownContent" style="display: none;"></div>
        </div>
    </div>

    <div class="modal-overlay" id="tokenModal" style="display: none;">
        <div class="modal">
            <h3 class="modal-title">GitHub 认证</h3>
            <div class="modal-body">
                <label for="githubToken">GitHub 个人访问令牌</label>
                <input type="password" id="githubToken" placeholder="输入你的 GitHub token">
                <p class="error-message" id="tokenError"></p>
                <label for="repoSelect">选择仓库</label>
                <select id="repoSelect" disabled>
                    <option value="">先验证 token</option>
                </select>
                <p class="error-message" id="repoError"></p>
            </div>
            <div class="modal-footer">
                <button class="modal-button" id="cancelButton">取消</button>
                <button class="modal-button primary" id="verifyButton">验证</button>
                <button class="modal-button primary" id="saveButton" style="display: none;">保存</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="repoModal" style="display: none;">
        <div class="modal">
            <h3 class="modal-title">切换仓库</h3>
            <div class="modal-body">
                <label for="newRepoSelect">选择新仓库</label>
                <select id="newRepoSelect">
                    <option value="">加载中...</option>
                </select>
                <p class="error-message" id="newRepoError"></p>
            </div>
            <div class="modal-footer">
                <button class="modal-button" id="cancelRepoButton">取消</button>
                <button class="modal-button primary" id="saveRepoButton">切换</button>
            </div>
        </div>
    </div>

    <script>
        // [优化4] 使用 DOMContentLoaded 替代 window.onload，无需等待图片等资源加载完毕
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化 marked.js
            marked.setOptions({
                breaks: true,
                gfm: true
            });

            // 获取 DOM 元素
            const tokenModal = document.getElementById('tokenModal');
            const githubTokenInput = document.getElementById('githubToken');
            const repoSelect = document.getElementById('repoSelect');
            const verifyButton = document.getElementById('verifyButton');
            const saveButton = document.getElementById('saveButton');
            const cancelButton = document.getElementById('cancelButton');
            const tokenError = document.getElementById('tokenError');
            const repoError = document.getElementById('repoError');

            const repoModal = document.getElementById('repoModal');
            const newRepoSelect = document.getElementById('newRepoSelect');
            const saveRepoButton = document.getElementById('saveRepoButton');
            const cancelRepoButton = document.getElementById('cancelRepoButton');
            const newRepoError = document.getElementById('newRepoError');

            const sidebar = document.getElementById('sidebar');
            const sidebarToggle = document.getElementById('sidebarToggle');
            const issueList = document.getElementById('issueList');
            const searchInput = document.getElementById('searchInput');
            const content = document.getElementById('content');
            const loading = document.getElementById('loading');
            const markdownContent = document.getElementById('markdownContent');
            const headerTitle = document.getElementById('headerTitle');
            const repoSwitcher = document.getElementById('repoSwitcher');

            // 状态变量
            let issues = [];
            let currentRepo = '';
            let currentIssue = null;
            let debounceTimer = null;
            let sidebarCollapsed = false;
            let imageViewer = null;
            let activeItemEl = null; // [优化7] 缓存当前高亮的侧边栏元素，避免全量遍历
            let renderAbortController = null; // [优化9] AbortController，用于取消过时的渲染请求
            const GH_CDN = 'gh-proxy.com'; // GitHub CDN 代理地址
            const DEBOUNCE_DELAY = 300; // 搜索防抖延迟（原500ms，降低以提升响应性）

            // [优化8] 复制按钮 SVG 图标模板，避免重复创建 HTML 字符串
            const COPY_ICON = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path fill="none" d="M0 0h24v24H0z"></path><path d="M7 4V2H17V4H20.0066C20.5552 4 21 4.44495 21 4.9934V21.0066C21 21.5552 20.5551 22 20.0066 22H3.9934C3.44476 22 3 21.5551 3 21.0066V4.9934C3 4.44476 3.44495 4 3.9934 4H7ZM7 6H5V20H19V6H17V8H7V6ZM9 4V6H15V4H9Z"></path></svg>`;
            const COPIED_ICON = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path fill="none" d="M0 0h24v24H0z"></path><path d="M6 4V8H18V4H20.0066C20.5552 4 21 4.44495 21 4.9934V21.0066C21 21.5552 20.5551 22 20.0066 22H3.9934C3.44476 22 3 21.5551 3 21.0066V4.9934C3 4.44476 3.44495 4 3.9934 4H6ZM8 2H16V6H8V2Z"></path></svg>`;

            // 检查本地存储中的 token 和仓库
            function checkAuth() {
                const token = localStorage.getItem('githubToken');
                const repo = localStorage.getItem('bjRepo');

                if (!token || !repo) {
                    showTokenModal();
                } else {
                    currentRepo = repo;
                    loadIssues(token, repo);
                }

                // 检查侧边栏折叠状态
                if (window.innerWidth > 768) {
                    const collapsed = localStorage.getItem('sidebarCollapsed');
                    collapsed === 'true' ? (sidebarCollapsed = true, sidebar.classList.add('collapsed'), sidebarToggle.classList.remove('active')) : (sidebarCollapsed = false, sidebar.classList.remove('collapsed'), sidebarToggle.classList.add('active'));
                }
            }

            // 显示 token 输入模态框
            function showTokenModal() {
                tokenModal.style.display = 'flex';
                githubTokenInput.focus();
            }

            // 隐藏 token 输入模态框
            function hideTokenModal() {
                tokenModal.style.display = 'none';
                tokenError.textContent = '';
                repoError.textContent = '';
            }

            // 显示仓库切换模态框
            function showRepoModal() {
                const token = localStorage.getItem('githubToken');
                if (!token) {
                    newRepoError.textContent = '请先设置 GitHub token';
                    return;
                }

                repoModal.style.display = 'flex';
                fetchRepos(token, newRepoSelect);
            }

            // 隐藏仓库切换模态框
            function hideRepoModal() {
                repoModal.style.display = 'none';
                newRepoError.textContent = '';
            }

            // 验证 GitHub token
            async function verifyToken(token) {
                try {
                    const response = await fetch('https://api.github.com/user', {
                        headers: {
                            'Authorization': `token ${token}`
                        }
                    });

                    if (response.ok) {
                        return true;
                    } else {
                        throw new Error('无效的 token');
                    }
                } catch (error) {
                    console.error('验证 token 失败:', error);
                    return false;
                }
            }

            // [优化4] 统一的仓库列表获取函数，消除重复代码
            async function fetchRepos(token, selectEl) {
                selectEl.innerHTML = '<option value="">加载中...</option>';
                selectEl.disabled = true;

                try {
                    const response = await fetch('https://api.github.com/user/repos?per_page=100&sort=updated', {
                        headers: {
                            'Authorization': `token ${token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });

                    if (!response.ok) {
                        throw new Error('获取仓库列表失败');
                    }

                    const repos = await response.json();
                    selectEl.innerHTML = '';

                    if (repos.length === 0) {
                        selectEl.innerHTML = '<option value="">没有可用的仓库</option>';
                        return;
                    }

                    // 按仓库名的字母顺序排序
                    repos.sort((a, b) => a.full_name.localeCompare(b.full_name));

                    // [优化6] 使用 DocumentFragment 批量插入 option
                    const fragment = document.createDocumentFragment();
                    repos.forEach(repo => {
                        const option = document.createElement('option');
                        option.value = repo.full_name;
                        option.textContent = repo.full_name;
                        fragment.appendChild(option);
                    });
                    selectEl.appendChild(fragment);

                    selectEl.disabled = false;

                    // 默认选中当前仓库
                    if (currentRepo) {
                        selectEl.value = currentRepo;
                    }
                } catch (error) {
                    console.error('获取仓库列表失败:', error);
                    selectEl.innerHTML = '<option value="">加载失败</option>';
                    // 根据目标 select 设置对应错误提示
                    if (selectEl === newRepoSelect) {
                        newRepoError.textContent = '获取仓库列表失败，请重试';
                    } else {
                        repoError.textContent = '获取仓库列表失败，请重试';
                    }
                }
            }

            // 加载 issue 列表
            async function loadIssues(token, repo) {
                loading.style.display = 'flex';
                markdownContent.style.display = 'none';
                markdownContent.innerHTML = ''; // [优化] 切换仓库时立即清空旧内容
                issueList.innerHTML = '';
                headerTitle.textContent = `加载 ${repo} 的 issues...`;

                try {
                    issues = [];
                    let page = 1;
                    while (true) {
                        const response = await fetch(`https://api.github.com/repos/${repo}/issues?state=open&sort=updated&per_page=100&page=${page}`, {
                            headers: {
                                'Authorization': `token ${token}`
                            }
                        });

                        if (!response.ok) {
                            if (response.status === 401) {
                                localStorage.removeItem('githubToken');
                                localStorage.removeItem('bjRepo');
                                showTokenModal();
                                tokenError.textContent = 'Token 已失效，请重新输入';
                                return;
                            }
                            throw new Error('获取 issues 失败');
                        }

                        const data = await response.json();
                        // [优化6] 使用 push + spread 替代 concat，避免每次创建新数组
                        issues.push(...data);
                        if (data.length < 100) {
                            break;
                        } else {
                            page++;
                        }
                    }

                    if (issues.length === 0) {
                        issueList.innerHTML = '<li style="padding: 15px; text-align: center;">没有 issues</li>';
                        markdownContent.innerHTML = '<p>这个仓库没有 issues。</p>';
                        markdownContent.style.display = 'block';
                        loading.style.display = 'none';
                        headerTitle.textContent = repo;
                        return;
                    }

                    renderIssueList();

                    // 默认显示最新的 issue
                    currentIssue = issues[0];
                    // [优化7] 高亮第一个侧边栏项，使用缓存引用
                    const firstItem = issueList.querySelector('.sidebar-item');
                    renderIssue(currentIssue);
                    highlightCurrentIssue(firstItem);
                    headerTitle.textContent = currentIssue.title;
                    headerTitle.href = currentIssue.html_url;
                } catch (error) {
                    console.error('加载 issues 失败:', error);
                    issueList.innerHTML = `<li style="padding: 15px; text-align: center; color: var(--danger-color);">加载 issues 失败</li>`;
                    loading.style.display = 'none';
                    headerTitle.textContent = '加载失败';
                }
            }

            // [优化6] 使用 DocumentFragment 批量渲染 issue 列表，减少 DOM 重排
            function renderIssueList() {
                searchInput.setAttribute('placeholder', `在 ${issues.length} 个 issues 中搜索...`);

                const fragment = document.createDocumentFragment();

                // [优化5] 不再为每个 li 单独绑定 click 监听器，改用事件委托
                issues.forEach(issue => {
                    const li = document.createElement('li');
                    li.className = 'sidebar-item';
                    li.dataset.id = issue.id;

                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'sidebar-item-title';
                    titleDiv.textContent = issue.title;

                    const metaDiv = document.createElement('div');
                    metaDiv.className = 'sidebar-item-meta';

                    const labelSpan = document.createElement('span');
                    labelSpan.textContent = issue.labels.map(label => label.name).join(' | ');

                    const dateSpan = document.createElement('span');
                    const date = new Date(issue.updated_at);
                    dateSpan.textContent = date.toLocaleDateString();

                    metaDiv.appendChild(labelSpan);
                    metaDiv.appendChild(dateSpan);

                    li.appendChild(titleDiv);
                    li.appendChild(metaDiv);

                    fragment.appendChild(li);
                });

                const noMatches = document.createElement('li');
                noMatches.id = 'noMatches';
                noMatches.style.display = 'none';
                noMatches.style.padding = '15px';
                noMatches.style.textAlign = 'center';
                noMatches.textContent = '没有匹配的 issues';
                fragment.appendChild(noMatches);

                // 一次性插入所有 DOM 节点
                issueList.appendChild(fragment);
            }

            // 替换 GitHub 官方图片链接为第三方 CDN 加速链接
            function replaceGithubImageLinks(md) {
                return md.replace(/!\[(.*?)\]\((.*?)\)/g, (match, alt, url) => {
                    if (url.startsWith('https://github.com/') && url.endsWith('?raw=true')) {
                        url = url.replace('?raw=true', '');
                        url = url.replace('/blob/', '/');
                        url = url.replace('https://github.com/', `https://${GH_CDN}/https://raw.githubusercontent.com/`);
                    } else if (url.startsWith('https://raw.githubusercontent.com/')) {
                        url = url.replace('https://raw.githubusercontent.com/', `https://${GH_CDN}/https://raw.githubusercontent.com/`);
                    }
                    return `![${alt}](${url})`;
                });
            }

            // [优化2] 去掉无意义的 setTimeout(fn, 50)，直接同步渲染
            // [优化3] hljs.highlightAll() 改为局部高亮，避免全页扫描
            // [优化7] 修复 issue.body 为 null 时的崩溃
            // [优化8] 修复 copycode 逻辑错误 + 使用事件委托减少监听器
            function renderIssue(issue) {
                // [优化9] 取消前一次尚未完成的渲染请求，防止竞态
                if (renderAbortController) renderAbortController.abort();
                const ac = new AbortController();
                renderAbortController = ac;

                loading.style.display = 'flex';
                markdownContent.style.display = 'none';

                // [优化7] issue.body 可能为 null，做防御性处理
                let newBody = replaceGithubImageLinks(issue.body || '');

                newBody += `\n<p style="text-align: center; font-size: 12px; font-style: italic; color: #999; margin: 30px 0 0;">Created at ${new Date(issue.created_at).toLocaleDateString()}</p>`;

                // [优化1-XSS] 使用 DOMPurify 净化 marked 输出，防止 XSS
                const rawHtml = marked.parse(newBody || '*没有内容*');
                const cleanHtml = DOMPurify.sanitize(rawHtml);

                // [优化9] 若已被更新的请求取消，则放弃本次渲染
                if (ac.signal.aborted) return;

                // [优化2] 直接渲染，移除 setTimeout 延迟
                markdownContent.innerHTML = cleanHtml;

                // 处理所有链接：添加target="_blank"和rel="noopener noreferrer"
                const links = markdownContent.querySelectorAll('a');
                links.forEach(link => {
                    if (!link.getAttribute('href')?.startsWith('#')) {
                        link.setAttribute('target', '_blank');
                        link.setAttribute('rel', 'noopener noreferrer');
                    }
                });

                // 销毁旧的查看器实例（如果有）
                if (imageViewer) {
                    imageViewer.destroy();
                }

                const images = markdownContent.querySelectorAll('img');

                // [优化8] 为所有图片添加懒加载
                images.forEach(img => {
                    img.loading = 'lazy';
                });

                if (images.length > 0) {
                    const options = {
                        navbar: false,
                        title: false,
                        toolbar: {
                            zoomIn: true,
                            zoomOut: true,
                            oneToOne: true,
                            reset: true,
                            prev: images.length > 1,
                            next: images.length > 1,
                            rotateLeft: true,
                            rotateRight: true,
                            flipHorizontal: true,
                            flipVertical: true,
                        },
                        backdrop: true,
                        transition: true,
                    };

                    imageViewer = new Viewer(markdownContent, options);
                }

                // 为代码块添加复制按钮
                const pres = markdownContent.querySelectorAll('pre');
                pres.forEach(item => {
                    const copybtn = document.createElement('span');
                    copybtn.innerHTML = COPY_ICON;
                    copybtn.className = 'copybtn';
                    item.appendChild(copybtn);
                });

                // [优化3] 局部高亮：仅高亮 markdownContent 内的代码块，而非全页面
                markdownContent.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });

                loading.style.display = 'none';
                markdownContent.style.display = 'block';
            }

            // [优化8] 使用事件委托处理复制按钮点击，替代为每个按钮单独添加监听器
            markdownContent.addEventListener('click', (e) => {
                const copybtn = e.target.closest('.copybtn');
                if (!copybtn) return;

                const pre = copybtn.closest('pre');
                if (!pre) return;

                const text = pre.firstElementChild?.innerText?.trim();
                if (!text) return;

                navigator.clipboard.writeText(text).then(() => {
                    copybtn.innerHTML = COPIED_ICON;
                    setTimeout(() => {
                        copybtn.innerHTML = COPY_ICON;
                    }, 2000);
                });
            });

            // [优化7] 高亮当前选中的 issue，使用缓存引用避免全量遍历
            function highlightCurrentIssue(newItemEl) {
                if (activeItemEl) activeItemEl.classList.remove('active');
                if (newItemEl) newItemEl.classList.add('active');
                activeItemEl = newItemEl;
            }

            // [优化5] 搜索优化：使用 Set 替代 Array.find，复杂度从 O(n*m) 降为 O(n+m)
            function searchIssues(query) {
                const lowerQuery = query.toLowerCase();
                const matchedIds = new Set(
                    issues
                        .filter(issue => issue.title.toLowerCase().includes(lowerQuery))
                        .map(issue => issue.id)
                );

                const items = issueList.querySelectorAll('.sidebar-item');
                items.forEach(item => {
                    const issueId = parseInt(item.dataset.id);
                    item.style.display = matchedIds.has(issueId) ? '' : 'none';
                });

                document.getElementById('noMatches').style.display = matchedIds.size === 0 && query ? 'block' : 'none';
            }

            // 事件监听器
            // [优化4] verifyButton 处理器复用 fetchRepos 函数，消除重复代码
            verifyButton.addEventListener('click', async () => {
                const token = githubTokenInput.value.trim();

                if (!token) {
                    tokenError.textContent = '请输入 GitHub token';
                    return;
                }

                verifyButton.disabled = true;
                verifyButton.textContent = '验证中...';

                const isValid = await verifyToken(token);

                if (isValid) {
                    tokenError.textContent = '';
                    githubTokenInput.disabled = true;
                    verifyButton.style.display = 'none';
                    saveButton.style.display = 'block';
                    repoSelect.disabled = false;

                    // [优化4] 复用统一的 fetchRepos 函数
                    await fetchRepos(token, repoSelect);
                } else {
                    tokenError.textContent = '无效的 token，请重试';
                }

                verifyButton.disabled = false;
                verifyButton.textContent = '验证';
            });

            saveButton.addEventListener('click', async () => {
                const repo = repoSelect.value;

                if (!repo) {
                    repoError.textContent = '请选择一个仓库';
                    return;
                }

                localStorage.setItem('githubToken', githubTokenInput.value);
                localStorage.setItem('bjRepo', repo);
                currentRepo = repo;

                hideTokenModal();
                loadIssues(githubTokenInput.value, repo);
            });

            cancelButton.addEventListener('click', () => {
                hideTokenModal();

                if (!localStorage.getItem('githubToken') || !localStorage.getItem('bjRepo')) {
                    showTokenModal();
                }
            });

            saveRepoButton.addEventListener('click', () => {
                const repo = newRepoSelect.value;

                if (!repo) {
                    newRepoError.textContent = '请选择一个仓库';
                    return;
                }

                localStorage.setItem('bjRepo', repo);
                currentRepo = repo;

                hideRepoModal();
                loadIssues(localStorage.getItem('githubToken'), repo);
            });

            cancelRepoButton.addEventListener('click', () => {
                hideRepoModal();
            });

            searchInput.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    searchIssues(searchInput.value.trim());
                }, DEBOUNCE_DELAY);
            });

            sidebarToggle.addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    sidebar.classList.toggle('visible');
                    sidebarToggle.classList.toggle('active');
                } else {
                    sidebarCollapsed = !sidebarCollapsed;
                    sidebar.classList.toggle('collapsed');
                    sidebarToggle.classList.toggle('active');
                    localStorage.setItem('sidebarCollapsed', sidebarCollapsed);
                }
            });

            repoSwitcher.addEventListener('click', () => {
                showRepoModal();
            });

            // [优化5] 使用事件委托处理 sidebar-item 点击，替代每个 li 单独绑定监听器
            issueList.addEventListener('click', (e) => {
                const li = e.target.closest('.sidebar-item');
                if (!li) return;

                const issueId = parseInt(li.dataset.id);
                const issue = issues.find(i => i.id === issueId);
                if (!issue) return;

                currentIssue = issue;
                renderIssue(issue);
                highlightCurrentIssue(li);
                headerTitle.textContent = issue.title;
                headerTitle.href = issue.html_url;

                // 在移动设备上点击后隐藏侧边栏
                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('visible');
                    sidebarToggle.classList.remove('active');
                }
            });

            // 初始化
            checkAuth();
        });
    </script>

    <!-- [优化-SW] 注册 Service Worker，实现 CDN 资源离线缓存 + 二次加载零延迟 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: './' })
                    .then((registration) => {
                        console.log('[SW] 注册成功，作用域:', registration.scope);

                        // 监听 Service Worker 更新
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            console.log('[SW] 发现新版本，正在安装...');
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'activated') {
                                    console.log('[SW] 新版本已激活，CDN 缓存已更新');
                                }
                            });
                        });
                    })
                    .catch((error) => {
                        console.warn('[SW] 注册失败:', error);
                    });

                // 监听控制器变更（新 SW 激活后提示用户）
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    console.log('[SW] 控制器已切换，新 Service Worker 已接管');
                });
            });
        } else {
            console.warn('[SW] 当前浏览器不支持 Service Worker');
        }
    </script>
</body>
